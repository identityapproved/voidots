# =============================================================================
# Terminal
# =============================================================================
set -g default-terminal "screen-256color"
set -as terminal-overrides ",foot*:Tc"
set -g update-environment "COLORTERM TERM_PROGRAM XTERM_VERSION"
set-environment -g COLORTERM "truecolor"
set -s escape-time 10
set -g history-limit 50000

# Image preview (yazi) — stop escape-seq responses leaking as keypresses
set -g allow-passthrough on
# sixel passthrough (foot supports it natively)
set -as terminal-features ",foot*:sixel"
set -g focus-events on
set -g mouse on

# =============================================================================
# Indexing
# =============================================================================
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# =============================================================================
# Windows / Panes
# =============================================================================
set -g prefix2 C-s
bind C-s send-prefix -2

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# Pane navigation (no prefix)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Auto-rename: show current dir basename
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

set -g status-left-length  80
set -g status-right-length 160
set -g status-interval 5

# Transparency
set -g window-style        'bg=default'
set -g window-active-style 'bg=default'

# =============================================================================
# Vi copy mode
# =============================================================================
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# =============================================================================
# Agent session layout — prefix+A
# =============================================================================
bind A new-session \; \
  rename-window "code" \; \
  new-window -n "agent" \; \
  new-window -n "git" \; \
  new-window -n "shell" \; \
  select-window -t 1

# =============================================================================
# Theme — kanagawa wave
# =============================================================================
set -g status-style                 "bg=#1f1f28,fg=#dcd7ba"

set -g status-left  "#[fg=#1f1f28,bg=#7e9cd8,bold] #S "
set -g status-right " %H:%M "

set -g window-status-separator      " "
set -g window-status-format         "#I:#W"
set -g window-status-current-format "#[fg=#7e9cd8,bold]#I:#W"

set -g pane-border-style            "fg=#2a2a37"
set -g pane-active-border-style     "fg=#7e9cd8"

set -g message-style                "bg=#2d4f67,fg=#dcd7ba"
set -g message-command-style        "bg=#2d4f67,fg=#c0a36e"
set -g mode-style                   "bg=#2d4f67,fg=#dcd7ba"
set -g clock-mode-colour            "#7e9cd8"

# =============================================================================
# Plugins (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'Nybkox/tmux-ukiyo'
set -g @ukiyo-theme "kanagawa/wave"

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

set -g @plugin 'tmux-plugins/vim-tmux-focus-events'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
run-shell 'tmux set -g window-style "bg=default"; tmux set -g window-active-style "bg=default"'
