# =============================================================================
# Terminal
# =============================================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB"
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g mouse on

# Pass Shift+Return (and other extended keys) through to inner programs
set -s extended-keys on
set -as terminal-features "alacritty:extkeys"

# =============================================================================
# Indexing
# =============================================================================
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# =============================================================================
# Windows / Panes
# =============================================================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Auto-rename: show current dir basename
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# =============================================================================
# Vi copy mode
# =============================================================================
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# =============================================================================
# Theme — void/forest
# =============================================================================
# Palette (mirrors alacritty.toml):
#   bg:           #0b0f0c
#   fg:           #d8e6d3
#   dark surface: #2d3a31
#   green:        #478061
#   bright green: #6aa875
#   cyan:         #6a9589
#   yellow:       #c0a36e
#   blue:         #7e9cd8
#   magenta:      #957fb8

set -g status-style                  "bg=#0b0f0c,fg=#d8e6d3"
set -g status-left-length            40
set -g status-right-length           100
set -g status-interval               5

# Left: session name
set -g status-left  "#[fg=#6aa875,bold] #S #[fg=#2d3a31,nobold]│ "

# Right: git branch | cwd | time
set -g status-right "#[fg=#6a9589]#(git -C #{pane_current_path} branch --show-current 2>/dev/null) #[fg=#2d3a31]│ #[fg=#c0a36e]#{b:pane_current_path} #[fg=#2d3a31]│ #[fg=#d8e6d3]%H:%M"

# Window tabs
set -g window-status-separator       ""
set -g window-status-format          "#[fg=#6a9589] #I:#W "
set -g window-status-current-format  "#[fg=#0b0f0c,bg=#478061,bold] #I:#W "

# Pane borders
set -g pane-border-style             "fg=#2d3a31"
set -g pane-active-border-style      "fg=#478061"

# Messages / command prompt
set -g message-style                 "bg=#2d3a31,fg=#d8e6d3"
set -g message-command-style         "bg=#2d3a31,fg=#c0a36e"

# Copy mode
set -g mode-style                    "bg=#478061,fg=#0b0f0c"

# Clock
set -g clock-mode-colour             "#478061"

# =============================================================================
# Agent session layout
# Prefix + A: new session scaffold for coding + agent work
# =============================================================================
bind A new-session \; \
  rename-window "code" \; \
  new-window -n "agent" \; \
  new-window -n "git" \; \
  new-window -n "shell" \; \
  select-window -t 1
